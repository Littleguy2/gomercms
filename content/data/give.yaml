hero_headline: "Giving is an act of worship here, not a transaction."
hero_text: "Every gift helps us keep our doors open, our community programmes running, and our family growing. Thank you for sowing into this work with us."
verse_text: "\"Each of you should give what you have decided in your heart to give, not reluctantly or under compulsion, for God loves a cheerful giver.\""
verse_reference: "2 Corinthians 9:7"
suggested_amounts: [20, 50, 100]
