hero_eyebrow: "New here?"
hero_headline: "Everything you need to know before Sunday."
hero_text: "No dress code, no expectations, no awkward introductions if you don't want them. Just come."
expect_text: "You'll be greeted at the door, not ambushed. Service runs a little over an hour and includes worship, prayer, and a message from Scripture you can actually apply on Monday morning. Come as you are, there's no dress code here."
faqs:
  - question: "What should I wear?"
    answer: "Whatever you're comfortable in. Some of our members dress up, many don't. You'll fit in either way."
  - question: "Is there something for my kids?"
    answer: "Yes. Sunday School runs alongside the main service for ages 4 to 13, led by teachers who love kids and follow Child Protection Advisory Service safeguarding guidance."
  - question: "Do I need to sign up before I come?"
    answer: "No. You're welcome to simply walk in. If you'd like someone to greet you personally, let us know through the contact page beforehand."
  - question: "Will I be asked to stand up or introduce myself?"
    answer: "Never anything you don't want. Visitors are welcomed warmly, never singled out or put on the spot."
  - question: "How do I get there?"
    answer: "We're at 31 Dunton Road, Leyton, London E10 7AF, close to Leyton Underground station on the Central line, with local bus routes nearby."
