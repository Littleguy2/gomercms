hero_headline: "Twenty years of restoring families in Leyton."
hero_text: "Founded in 2002 in the heart of Leyton, Gomer Faith Ministries has spent more than twenty years walking alongside families across East London."
vision_headline: "Restoring families and changing lives."
vision_text: "Isaiah put it this way: \"You shall raise up the foundations of many generations, and you shall be called the repairer of the breach, the restorer of streets to dwell in.\" That's the work. That's us."
safeguarding_headline: "Every child and vulnerable adult, safe in our care."
safeguarding_text: "Gomer Faith Ministries follows Child Protection Advisory Service guidance across every ministry that works with children and young people, including Sunday School and Youth Next Door."
